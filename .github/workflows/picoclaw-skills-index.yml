name: Skills Index

on:
  push:
    branches: [main]
    paths:
      - 'picoclaw/skills/**/SKILL.md'
      - 'skills/**/SKILL.md'
      - '.github/workflows/picoclaw-skills-index.yml'
  workflow_dispatch:
    inputs:
      search_paths:
        description: 'Comma-separated list of paths to search for SKILL.md files'
        required: false
        default: 'picoclaw/skills,skills'
        type: string

permissions:
  contents: write

jobs:
  index:
    runs-on: ubuntu-latest
    steps:
      - name: Set Defaults
        id: workflow
        env:
          SEARCH_PATHS: ${{ github.event.inputs.search_paths || 'picoclaw/skills,skills' }}
        run: |
          # Set Defaults
          FULL_REF="${{ github.workflow_ref }}"
          WITHOUT_REF="${FULL_REF%@*}"
          FILENAME="${WITHOUT_REF##*/}"
          NAME="${FILENAME%.*}"

          echo "WORKFLOW_NAME=${NAME}"                      >> $GITHUB_ENV
          echo "SEARCH_PATHS=${SEARCH_PATHS}"               >> $GITHUB_ENV
          echo "GITHUB_REPOSITORY=${{ github.repository }}" >> $GITHUB_ENV

      - uses: actions/checkout@v4

      - name: Generate Skills Index
        id: index
        shell: python
        run: |

          import os
          import json
          import re
          from pathlib import Path
          from datetime import datetime, timezone

          search_paths = '${{ env.SEARCH_PATHS }}'.split(',')
          repo = '${{ env.GITHUB_REPOSITORY }}'
          output_file = '${{ env.WORKFLOW_NAME }}' + '.json'
          
          local_skills = []
          included_skills = []
          
          def extract_frontmatter(content):
              """Extract YAML frontmatter from markdown."""
              if content.startswith('---'):
                  end = content.find('---', 3)
                  if end > 0:
                      fm = content[3:end]
                      name_match = re.search(r'^name:\s*(.+)$', fm, re.MULTILINE)
                      desc_match = re.search(r'^description:\s*(.+)$', fm, re.MULTILINE)
                      return name_match.group(1).strip() if name_match else '', desc_match.group(1).strip() if desc_match else ''
              return None, None
          
          def extract_from_content(content):
              """Extract name/description from markdown content."""
              lines = content.split('\n')
              
              # First non-empty line should be the title
              name = ''
              for line in lines:
                  line = line.strip()
                  if line:
                      if line.startswith('#'):
                          name = re.sub(r'^#+\s*', '', line).strip()
                      break
              
              # Description from second non-empty heading or blockquote
              desc = ''
              in_desc = False
              for line in lines[1:]:
                  line = line.strip()
                  if line.startswith('##') or line.startswith('# '):
                      break
                  if line.startswith('>') or line.startswith('> '):
                      if not in_desc:
                          in_desc = True
                      desc = line.lstrip('> ').strip()
                      break
              
              return name, desc
          
          def process_skill_md(filepath, folder):
              """Process a SKILL.md file."""

              with open(filepath, 'r') as f:
                  content = f.read()
              
              # Try frontmatter first
              name, description = extract_frontmatter(content)
              
              # Fall back to content extraction
              if not name:
                  name, description = extract_from_content(content)
              
              # Get list of all files in folder (recursive)
              files = [str(p.relative_to(Path(filepath).parent)) for p in Path(filepath).parent.rglob('*') if p.is_file()]
              
              download_url = f"https://raw.githubusercontent.com/{repo}/main/{folder}"
              
              slug = Path(filepath).parent.name
              
              return {
                  "slug": slug,
                  "name": name or slug,
                  "description": description or "",
                  "_path": folder,
                  "download_url": download_url,
                  "files": files
              }
          
          def process_json_file(filepath):
              """Process a JSON file, extracting skill objects."""
              try:
                  with open(filepath, 'r') as f:
                      data = json.load(f)
                  
                  folder = os.path.dirname(filepath)
                  
                  if isinstance(data, list):
                      skills = []
                      for s in data:
                          if isinstance(s, dict) and 'slug' in s:
                              s = s.copy()
                              slug = s['slug']
                              s['_path'] = folder if folder.endswith(slug) else os.path.join(folder, slug)
                              skills.append(s)
                      return skills
                  elif isinstance(data, dict) and 'slug' in data:
                      data = data.copy()
                      slug = data['slug']
                      data['_path'] = folder if folder.endswith(slug) else os.path.join(folder, slug)
                      return [data]
                  return []
              except:
                  return []

          
          # Walk each search path
          for base_path in search_paths:
              base_path = base_path.strip()
              if not base_path or not os.path.exists(base_path):
                  continue
              
              print(f"=== DEBUG: Walking {base_path} ===")
              
              # Walk directory tree
              for root, dirs, files in os.walk(base_path):
                  folder = root
                  
                  print(f"=== DEBUG: Checking {root}, files: {files} ===")
                  
                  # If SKILL.md exists, process it
                  if 'SKILL.md' in files:
                      skill_path = os.path.join(root, 'SKILL.md')
                      try:
                          skill = process_skill_md(skill_path, folder)
                          local_skills.append(skill)
                          print(f"=== DEBUG: Added skill: {skill['slug']} ===")
                      except Exception as e:
                          print(f"=== DEBUG: Error processing {skill_path}: {e} ===")
                  
                  # Process any JSON files in this directory
                  json_files = [f for f in files if f.endswith('.json')]

                  for json_file in json_files:
                      json_path = os.path.join(root, json_file)
                      skills = process_json_file(json_path)
                      included_skills.extend(skills)
                      print(f"=== DEBUG: Added {len(skills)} from {json_file} ===")
          
          # Merge and output
          result = {
              "skills": local_skills + included_skills,
              "updated_at": datetime.now(timezone.utc).strftime('%Y-%m-%dT%H:%SZ')
          }
          
          with open(output_file, 'w') as f:
              json.dump(result, f, indent=2)
          
          print(f"=== DEBUG: Wrote {len(result['skills'])} skills to {output_file} ===")

      - name: Generate Output Files
        run: |
          # Generate markdown list for summary
          
          cat > "${WORKFLOW_NAME}.md" << 'EOF'
          | Slug | Name | Description |
          |------|------|-------------|
          EOF

          jq -r '.skills[] | select(type == "object") | "| \(.slug) | \(.name // .slug) | \(.description // "") |"' "${WORKFLOW_NAME}.json" >> "${WORKFLOW_NAME}.md"
          
          # Add link to JSON file
          echo "" >> "${WORKFLOW_NAME}.md"
          echo "[${WORKFLOW_NAME}.json](${WORKFLOW_NAME}.json)" >> "${WORKFLOW_NAME}.md"

      - name: Update Wiki
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Clone wiki repo and update skills index
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git clone --depth 1 https://x-access-token:$GITHUB_TOKEN@github.com/${{ github.repository }}.wiki.git wiki
          cd wiki
          cp "../${WORKFLOW_NAME}".* .
          git add .
          git commit -m "Update skills index" || echo "No changes to commit"
          git push

      - name: Update Workflow Summary
        run: |
          count=$(jq '.skills | length' "${WORKFLOW_NAME}.json")
          echo "## Skills Index"      >> $GITHUB_STEP_SUMMARY
          echo ""                     >> $GITHUB_STEP_SUMMARY
          echo "Total skills: $count" >> $GITHUB_STEP_SUMMARY
