name: Skills Index

on:
  push:
    branches: [main]
    paths:
      - 'picoclaw/skills/**/SKILL.md'
      - 'skills/**/SKILL.md'
      - '.github/workflows/picoclaw-skills-index.yml'
  workflow_dispatch:
    inputs:
      search_paths:
        description: 'Comma-separated list of paths to search for SKILL.md files'
        required: false
        default: 'picoclaw/skills'
        type: string

permissions:
  contents: write

jobs:
  index:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate Skills Index
        env:
          INPUT_SEARCH_PATHS: ${{ github.event.inputs.search_paths }}
        id: index
        run: |
          # Convert comma-separated input to space-separated
          search_paths="${INPUT_SEARCH_PATHS:-picoclaw/skills}"
          search_paths="${search_paths//,/ }"
          
          # Generate skills index
          # 1. Find SKILL.md files and generate entries
          local_skills=$(for base_path in $search_paths; do
            find "$base_path" -name 'SKILL.md' -type f 2>/dev/null
          done | while read file; do
            # slug = parent dir, category = grandparent dir
            slug=$(basename "$(dirname "$file")")
            category=$(basename "$(dirname "$(dirname "$file")")")
            folder="${file%/*}"
            
            # Extract frontmatter or first heading as name/description
            # Try frontmatter first (YAML between ---)
            if grep -q '^---$' "$file" 2>/dev/null; then
              name=$(sed -n '/^---$/,/^---$/{/^---$/d; /^name:/s/.*name: *//p; q}' "$file")
              description=$(sed -n '/^---$/,/^---$/{/^---$/d; /^description:/s/.*description: *//p; q}' "$file")
            fi
            
            # Fallback to first heading if no frontmatter
            if [ -z "$name" ]; then
              name=$(sed -n 's/^# *//p' "$file" | head -1)
            fi
            if [ -z "$description" ]; then
              description=$(sed -n '2,/^#/{s/^## *//; s/^# *//; p; q}' "$file")
            fi
            
            # Build raw URL for folder
            download_url="https://raw.githubusercontent.com/${GITHUB_REPOSITORY}/main/${folder}"
            
            # List all files in the skill folder (relative paths from folder)
            files=$(cd "$(dirname "$file")" && find . -type f | sed 's|^\./||' | jq -R -s -c 'split("\n") | map(select(length > 0))')
            
            echo "{\"slug\":\"$slug\",\"name\":\"$name\",\"description\":\"$description\",\"path\":\"$file\",\"download_url\":\"$download_url\",\"files\":$files}"
          done | jq -s '.')
          
          # 2. Find *.json include files and merge them
          included_skills=$(for base_path in $search_paths; do
            find "$base_path" -name '*.json' -type f 2>/dev/null
          done | while read file; do
            cat "$file"
          done | jq -s '.')
          
          # Merge local skills with included skills
          index_json=$(jq -n --argjson local "$local_skills" --argjson included "$included_skills" '$local + $included')
          
          # Create full index with timestamp
          echo "{\"version\":1,\"updated_at\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\",\"skills\":$index_json}" > skills-index.json

      - name: Get Workflow Filename
        id: workflow
        run: |
          FULL_REF="${{ github.workflow_ref }}"
          WITHOUT_REF="${FULL_REF%@*}"
          FILENAME="${WITHOUT_REF##*/}"
          echo "name=${FILENAME%.*}" >> $GITHUB_OUTPUT

      - name: Generate Markdown List
        run: |
          # Generate markdown list for summary
          workflow_name="${{ steps.workflow.outputs.name }}"
          cat > "${workflow_name}.md" << 'EOF'
          | Slug | Name | Description |
          |------|------|-------------|
          EOF
          jq -r '.skills[] | "| \(.slug) | \(.name // .slug) | \(.description // "") |"' skills-index.json >> "${workflow_name}.md"

      - name: Update Wiki
        run: |
          # Clone wiki repo and update skills index
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          workflow_name="${{ steps.workflow.outputs.name }}"

          git clone --depth 1 https://x-access-token:$GITHUB_TOKEN@github.com/${{ github.repository }}.wiki.git wiki
          cd wiki
          cp ../skills-index.json .
          cp "../${workflow_name}.md" .
          git add .
          git commit -m "Update skills index" || echo "No changes to commit"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Workflow Summary
        run: |
          count=$(jq '.skills | length' skills-index.json)
          echo "## Skills Index" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Total skills: $count" >> $GITHUB_STEP_SUMMARY
